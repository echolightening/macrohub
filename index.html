<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MacroHub">
<meta name="theme-color" content="#0a0a0a">
<title>MacroHub</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0ede8;
    --muted: #888;
    --dim: #555;
    --accent: #c8f55a;
    --accent-dim: rgba(200,245,90,0.12);
    --claude: #d4956a;
    --openai: #74c99a;
    --gemini: #7eb8f7;
    --grok: #c4b5f7;
    --r: 12px;
    --rs: 8px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --font-mono: ui-monospace, 'SF Mono', 'Courier New', monospace;
    --font-serif: ui-serif, Georgia, 'Times New Roman', serif;
  }

  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: var(--font-mono);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .app {
    min-height: 100vh;
    padding: calc(var(--safe-top) + 20px) 18px calc(var(--safe-bottom) + 40px);
    max-width: 480px;
    margin: 0 auto;
  }

  header {
    display: flex; align-items: baseline; gap: 10px;
    margin-bottom: 28px;
    padding-top: 8px;
  }
  header h1 {
    font-family: var(--font-serif);
    font-size: 28px; font-weight: 600; letter-spacing: -0.5px;
    color: var(--text);
  }
  header .sub {
    font-size: 11px; color: var(--dim); letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .label {
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--dim); margin-bottom: 8px;
  }

  textarea {
    width: 100%; min-height: 130px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 14px;
    color: var(--text); font-family: var(--font-mono); font-size: 13px;
    line-height: 1.6; resize: vertical;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  textarea:focus { outline: none; border-color: var(--border2); }
  textarea::placeholder { color: var(--dim); }

  .run-btn {
    width: 100%; margin-top: 12px;
    background: var(--accent); color: #0a0a0a;
    border: none; border-radius: var(--r);
    padding: 16px; font-family: var(--font-mono);
    font-size: 14px; font-weight: 500; cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .run-btn:active { transform: scale(0.98); opacity: 0.85; }
  .run-btn:disabled { opacity: 0.4; cursor: default; }

  .section { margin-top: 28px; }

  .ai-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }

  .ai-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 14px; position: relative;
    overflow: hidden; transition: border-color 0.3s;
    min-height: 160px;
  }
  .ai-card.loading { border-color: var(--border2); }
  .ai-card.done { border-color: var(--border2); }
  .ai-card.error { border-color: rgba(255,80,80,0.3); }

  .ai-card-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
  }
  .ai-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .ai-name { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }

  .dot-claude { background: var(--claude); }
  .dot-openai { background: var(--openai); }
  .dot-gemini { background: var(--gemini); }
  .dot-grok   { background: var(--grok); }

  .name-claude { color: var(--claude); }
  .name-openai { color: var(--openai); }
  .name-gemini { color: var(--gemini); }
  .name-grok   { color: var(--grok); }

  .ai-status {
    font-size: 11px; color: var(--dim); margin-left: auto;
  }

  .ai-content {
    font-size: 12px; line-height: 1.6; color: var(--text);
  }

  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--border2); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
    margin-left: auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .macro-mini { width: 100%; }
  .macro-mini tr { display: flex; justify-content: space-between; }
  .macro-mini td {
    font-size: 11px; padding: 2px 0; color: var(--muted);
  }
  .macro-mini td:last-child { color: var(--text); text-align: right; }
  .macro-mini .cal-row td { color: var(--text); font-weight: 500; font-size: 13px; }
  .macro-mini .total-row td { color: var(--accent); font-size: 13px; font-weight: 500; border-top: 1px solid var(--border); padding-top: 6px; margin-top: 4px; }

  .error-msg { font-size: 11px; color: #ff6060; }

  .fivem-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 16px; margin-top: 10px;
    display: none;
  }
  .fivem-section.visible { display: block; }

  .fivem-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
    margin-top: 12px;
  }
  .fivem-plus-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    margin-top: 10px;
  }
  .stat-block { text-align: center; }
  .stat-block .stat-n {
    font-size: 18px; font-weight: 500; color: var(--accent);
    font-family: var(--font-serif);
  }
  .stat-block .stat-n.stat-warn { color: #f4a460; }
  .stat-block .stat-l {
    font-size: 9px; color: var(--dim); text-transform: uppercase;
    letter-spacing: 0.08em; margin-top: 3px;
  }
  .fivem-divider {
    border: none; border-top: 1px solid var(--border);
    margin: 14px 0 0;
  }

  .full-results { margin-top: 28px; display: none; }
  .full-results.visible { display: block; }

  .full-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); margin-bottom: 12px; overflow: hidden;
  }
  .full-card-header {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
  }
  .full-card-body { padding: 14px 16px; overflow-x: auto; }

  table.macro-full {
    width: 100%; border-collapse: collapse; font-size: 11px;
  }
  .macro-full th {
    color: var(--dim); font-weight: 500; text-align: right;
    padding: 4px 6px; border-bottom: 1px solid var(--border);
    white-space: nowrap; font-size: 10px; letter-spacing: 0.04em;
  }
  .macro-full th:first-child { text-align: left; }
  .macro-full td {
    padding: 5px 6px; color: var(--text); text-align: right;
    border-bottom: 1px solid var(--border); font-size: 11px;
  }
  .macro-full td:first-child { text-align: left; color: var(--muted); }
  .macro-full tr:last-child td { border-bottom: none; }
  .macro-full .total-row td { color: var(--accent); font-weight: 500; border-top: 1px solid var(--border2); }

  .settings-toggle {
    background: none; border: none; color: var(--dim);
    font-family: var(--font-mono); font-size: 11px;
    cursor: pointer; padding: 4px 0; text-decoration: underline;
    text-underline-offset: 3px;
    -webkit-tap-highlight-color: transparent;
  }

  .settings-panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); padding: 16px; margin-top: 10px;
    display: none;
  }
  .settings-panel.open { display: block; }

  .key-row { margin-bottom: 12px; }
  .key-row label { display: block; font-size: 10px; color: var(--dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px; }
  .key-row input {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: var(--rs);
    padding: 10px 12px; color: var(--text);
    font-family: var(--font-mono); font-size: 12px;
    -webkit-appearance: none;
  }
  .key-row input:focus { outline: none; border-color: var(--border2); }
  .key-row input::placeholder { color: var(--dim); }

  .save-btn {
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text); border-radius: var(--rs);
    padding: 10px 18px; font-family: var(--font-mono);
    font-size: 12px; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .save-btn:active { opacity: 0.7; }

  .toast {
    position: fixed; bottom: calc(var(--safe-bottom) + 20px); left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text); color: var(--bg);
    font-family: var(--font-mono); font-size: 12px;
    padding: 10px 18px; border-radius: 99px;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap; pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  .waiting { color: var(--dim); font-size: 12px; padding: 20px 0; text-align: center; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>MacroHub</h1>
    <span class="sub">4 AI · parallel</span>
  </header>

  <div class="label">API Keys</div>
  <button class="settings-toggle" onclick="toggleSettings()">configure keys ↓</button>
  <div class="settings-panel" id="settings-panel">
    <div class="key-row">
      <label>Anthropic (Claude)</label>
      <input type="password" id="key-claude" placeholder="sk-ant-..." autocomplete="off" spellcheck="false">
    </div>
    <div class="key-row">
      <label>OpenAI (GPT-4o)</label>
      <input type="password" id="key-openai" placeholder="sk-..." autocomplete="off" spellcheck="false">
    </div>
    <div class="key-row">
      <label>Google (Gemini)</label>
      <input type="password" id="key-gemini" placeholder="AIza..." autocomplete="off" spellcheck="false">
    </div>
    <div class="key-row">
      <label>xAI (Grok)</label>
      <input type="password" id="key-grok" placeholder="xai-..." autocomplete="off" spellcheck="false">
    </div>
    <button class="save-btn" onclick="saveKeys()">save keys locally</button>
  </div>

  <div class="divider"></div>

  <div class="label">Your meal</div>
  <textarea id="meal" placeholder="e.g. Texas de Brazil: 3 cuts picanha, 2 lamb chops, 1 chicken leg, feijoada 1 cup, cheese bread 2 pieces, salad bar — mixed greens, tomato, hearts of palm, 2 tbsp Caesar dressing"></textarea>
  <button class="run-btn" id="run-btn" onclick="runAll()">estimate macros →</button>

  <div class="section" id="cards-section" style="display:none;">
    <div class="label">Live results</div>
    <div class="ai-grid" id="ai-grid">
      <div class="ai-card" id="card-claude">
        <div class="ai-card-header">
          <div class="ai-dot dot-claude"></div>
          <span class="ai-name name-claude">Claude</span>
          <div class="spinner" id="spin-claude"></div>
        </div>
        <div class="ai-content" id="content-claude"><span class="waiting">—</span></div>
      </div>
      <div class="ai-card" id="card-openai">
        <div class="ai-card-header">
          <div class="ai-dot dot-openai"></div>
          <span class="ai-name name-openai">GPT-4o</span>
          <div class="spinner" id="spin-openai"></div>
        </div>
        <div class="ai-content" id="content-openai"><span class="waiting">—</span></div>
      </div>
      <div class="ai-card" id="card-gemini">
        <div class="ai-card-header">
          <div class="ai-dot dot-gemini"></div>
          <span class="ai-name name-gemini">Gemini</span>
          <div class="spinner" id="spin-gemini"></div>
        </div>
        <div class="ai-content" id="content-gemini"><span class="waiting">—</span></div>
      </div>
      <div class="ai-card" id="card-grok">
        <div class="ai-card-header">
          <div class="ai-dot dot-grok"></div>
          <span class="ai-name name-grok">Grok</span>
          <div class="spinner" id="spin-grok"></div>
        </div>
        <div class="ai-content" id="content-grok"><span class="waiting">—</span></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="fivem-section" id="fivem-section">
      <div class="label">5m — calories</div>
      <div class="fivem-grid" id="fivem-grid"></div>
      <div style="margin-top:20px;" class="label">5m+ — conservative ceiling</div>
      <div class="fivem-plus-grid" id="fivem-plus-grid"></div>
      <div style="margin-top:6px;font-size:10px;color:var(--dim);">max cal · carb · fat · sat fat &nbsp;/&nbsp; min protein · fiber</div>
      <div style="margin-top:10px;font-size:10px;color:var(--dim);" id="fivem-note"></div>
    </div>
  </div>

  <div class="full-results" id="full-results">
    <div class="label">Full tables</div>
    <div id="full-cards"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PROMPT = `You are a precise macro estimator. Given the meal below, return ONLY a JSON object — no markdown, no explanation, no backticks. The JSON must have this exact shape:
{
  "items": [
    {"name": "Item name", "cal": 320, "pro": 28, "carb": 12, "fat": 18, "satfat": 6, "fiber": 1}
  ],
  "total": {"cal": 320, "pro": 28, "carb": 12, "fat": 18, "satfat": 6, "fiber": 1}
}
Use realistic restaurant/food portions. Be precise, not conservative.

Meal: `;

const AI_CONFIGS = {
  claude: { label: 'Claude', color: 'var(--claude)' },
  openai: { label: 'GPT-4o', color: 'var(--openai)' },
  gemini: { label: 'Gemini', color: 'var(--gemini)' },
  grok:   { label: 'Grok',   color: 'var(--grok)' },
};

let results = {};

function loadKeys() {
  ['claude','openai','gemini','grok'].forEach(k => {
    const v = localStorage.getItem('mk_' + k);
    if (v) document.getElementById('key-' + k).value = v;
  });
}

function saveKeys() {
  ['claude','openai','gemini','grok'].forEach(k => {
    const v = document.getElementById('key-' + k).value.trim();
    if (v) localStorage.setItem('mk_' + k, v);
  });
  showToast('Keys saved');
  toggleSettings();
}

function getKey(name) {
  return document.getElementById('key-' + name).value.trim() ||
         localStorage.getItem('mk_' + name) || '';
}

function toggleSettings() {
  const p = document.getElementById('settings-panel');
  p.classList.toggle('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function setCardState(id, state) {
  const card = document.getElementById('card-' + id);
  const spin = document.getElementById('spin-' + id);
  card.className = 'ai-card ' + state;
  spin.style.display = state === 'loading' ? 'inline-block' : 'none';
}

function renderMini(data) {
  const t = data.total;
  return `<table class="macro-mini">
    <tr class="cal-row"><td>calories</td><td>${t.cal}</td></tr>
    <tr><td>protein</td><td>${t.pro}g</td></tr>
    <tr><td>carbs</td><td>${t.carb}g</td></tr>
    <tr><td>fat</td><td>${t.fat}g</td></tr>
    <tr><td>sat fat</td><td>${t.satfat}g</td></tr>
    <tr><td>fiber</td><td>${t.fiber}g</td></tr>
  </table>`;
}

function renderFull(id, data) {
  const cfg = AI_CONFIGS[id];
  const rows = data.items.map(item =>
    `<tr>
      <td>${item.name}</td>
      <td>${item.cal}</td><td>${item.pro}</td><td>${item.carb}</td>
      <td>${item.fat}</td><td>${item.satfat}</td><td>${item.fiber}</td>
    </tr>`
  ).join('');
  const t = data.total;
  return `<div class="full-card">
    <div class="full-card-header">
      <div class="ai-dot dot-${id}"></div>
      <span class="ai-name name-${id}">${cfg.label}</span>
    </div>
    <div class="full-card-body">
      <table class="macro-full">
        <thead><tr>
          <th>Item</th><th>Cal</th><th>Pro</th><th>Carb</th><th>Fat</th><th>Sat</th><th>Fib</th>
        </tr></thead>
        <tbody>${rows}
        <tr class="total-row">
          <td>Total</td>
          <td>${t.cal}</td><td>${t.pro}</td><td>${t.carb}</td>
          <td>${t.fat}</td><td>${t.satfat}</td><td>${t.fiber}</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>`;
}

function updateFiveM() {
  const done = Object.values(results).filter(r => r && r.total);
  if (done.length < 2) return;

  // 5m — calories
  const cals = done.map(r => r.total.cal);
  const sorted = [...cals].sort((a,b)=>a-b);
  const min = sorted[0];
  const max = sorted[sorted.length-1];
  const mean = Math.round(cals.reduce((a,b)=>a+b,0)/cals.length);
  const mid = Math.floor(sorted.length/2);
  const median = sorted.length%2===0
    ? Math.round((sorted[mid-1]+sorted[mid])/2)
    : sorted[mid];
  const freq = {};
  cals.forEach(v => freq[v]=(freq[v]||0)+1);
  const maxF = Math.max(...Object.values(freq));
  const modes = Object.keys(freq).filter(k=>freq[k]===maxF).map(Number);
  const mode = modes.length===cals.length ? '—' : modes.join('/');

  document.getElementById('fivem-grid').innerHTML =
    [['Min',min],['Mean',mean],['Median',median],['Mode',mode],['Max',max]]
    .map(([l,v])=>`<div class="stat-block"><div class="stat-n">${v}</div><div class="stat-l">${l}</div></div>`)
    .join('');

  // 5m+ — conservative ceiling
  // max for: cal, carb, fat, satfat | min for: pro, fiber
  const pluck = (key, fn) => fn(...done.map(r => r.total[key]));
  const plus = {
    cal:    pluck('cal',    Math.max),
    pro:    pluck('pro',    Math.min),
    carb:   pluck('carb',   Math.max),
    fat:    pluck('fat',    Math.max),
    satfat: pluck('satfat', Math.max),
    fiber:  pluck('fiber',  Math.min),
  };

  // Row 1: cal / pro / carb | Row 2: fat / satfat / fiber
  const plusFields = [
    ['cal',    plus.cal    + ' kcal', false],
    ['protein',plus.pro    + 'g',     true],
    ['carbs',  plus.carb   + 'g',     false],
    ['fat',    plus.fat    + 'g',     false],
    ['sat fat',plus.satfat + 'g',     false],
    ['fiber',  plus.fiber  + 'g',     true],
  ];

  document.getElementById('fivem-plus-grid').innerHTML = plusFields
    .map(([l,v,isMin])=>`<div class="stat-block">
      <div class="stat-n${isMin?' stat-warn':''}">${v}</div>
      <div class="stat-l">${l}</div>
    </div>`)
    .join('');

  const sources = Object.keys(results).filter(k=>results[k]&&results[k].total)
    .map(k=>AI_CONFIGS[k].label).join(', ');
  document.getElementById('fivem-note').textContent = 'sources: ' + sources;
  document.getElementById('fivem-section').classList.add('visible');
}

function updateFullResults() {
  const done = Object.keys(results).filter(k=>results[k]&&results[k].total);
  if (done.length === 0) return;
  const html = done.map(id => renderFull(id, results[id])).join('');
  document.getElementById('full-cards').innerHTML = html;
  document.getElementById('full-results').classList.add('visible');
}

function parseJSON(text) {
  let s = text.trim();
  s = s.replace(/^```(?:json)?/,'').replace(/```$/,'').trim();
  return JSON.parse(s);
}

async function callClaude(meal, key) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': key,
      'anthropic-version': '2023-06-01',
    },
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 1200,
      messages: [{ role: 'user', content: PROMPT + meal }]
    })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);
  return parseJSON(data.content[0].text);
}

async function callOpenAI(meal, key) {
  const resp = await fetch('https://api.openai.com/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + key,
    },
    body: JSON.stringify({
      model: 'gpt-4o',
      max_tokens: 1200,
      messages: [{ role: 'user', content: PROMPT + meal }]
    })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);
  return parseJSON(data.choices[0].message.content);
}

async function callGemini(meal, key) {
  const resp = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: PROMPT + meal }] }],
        generationConfig: { maxOutputTokens: 1200 }
      })
    }
  );
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message);
  return parseJSON(data.candidates[0].content.parts[0].text);
}

async function callGrok(meal, key) {
  const resp = await fetch('https://api.x.ai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + key,
    },
    body: JSON.stringify({
      model: 'grok-3',
      max_tokens: 1200,
      messages: [{ role: 'user', content: PROMPT + meal }]
    })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
  return parseJSON(data.choices[0].message.content);
}

async function runOne(id, callFn, key) {
  setCardState(id, 'loading');
  document.getElementById('content-' + id).innerHTML = '<span class="waiting">estimating…</span>';
  try {
    const data = await callFn(key);
    results[id] = data;
    setCardState(id, 'done');
    document.getElementById('content-' + id).innerHTML = renderMini(data);
    updateFiveM();
    updateFullResults();
  } catch(e) {
    setCardState(id, 'error');
    document.getElementById('content-' + id).innerHTML =
      `<span class="error-msg">${e.message.slice(0,80)}</span>`;
  }
}

async function runAll() {
  const meal = document.getElementById('meal').value.trim();
  if (!meal) { showToast('Enter a meal first'); return; }

  const keys = {
    claude: getKey('claude'),
    openai: getKey('openai'),
    gemini: getKey('gemini'),
    grok:   getKey('grok'),
  };

  const missing = Object.entries(keys).filter(([,v])=>!v).map(([k])=>AI_CONFIGS[k].label);
  if (missing.length === 4) {
    showToast('Add at least one API key');
    document.getElementById('settings-panel').classList.add('open');
    return;
  }

  results = {};
  document.getElementById('cards-section').style.display = 'block';
  document.getElementById('fivem-section').classList.remove('visible');
  document.getElementById('full-results').classList.remove('visible');
  document.getElementById('run-btn').disabled = true;

  const tasks = [];
  if (keys.claude)  tasks.push(runOne('claude', m => callClaude(meal, keys.claude), keys.claude));
  if (keys.openai)  tasks.push(runOne('openai', m => callOpenAI(meal, keys.openai), keys.openai));
  if (keys.gemini)  tasks.push(runOne('gemini', m => callGemini(meal, keys.gemini), keys.gemini));
  if (keys.grok)    tasks.push(runOne('grok',   m => callGrok(meal, keys.grok), keys.grok));

  await Promise.allSettled(tasks);
  document.getElementById('run-btn').disabled = false;
}

loadKeys();
</script>
